<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" />
  <title>IFASY Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="state-login">

  <!-- ░░ TITLEBAR ░░ -->
  <header class="titlebar">
    <div class="titlebar__brand">
      <span class="dot"></span>IFASY <em>Launcher</em>
    </div>
    <div class="titlebar__win">
      <button id="gearBtn" class="winbtn" title="Einstellungen">&#9881;</button>
      <button id="minBtn" class="winbtn" title="Minimieren">&#9472;</button>
      <button id="closeBtn" class="winbtn winbtn--close" title="Schließen">&#10005;</button>
    </div>
  </header>

  <!-- ░░ LOGIN ░░ -->
  <section class="login">
    <div class="login__art"></div>
    <div class="login__card">
      <div class="logo">IFASY</div>
      <div class="logo__tag">CO-OP ZOMBIE SHOOTER</div>
      <form id="loginForm" autocomplete="off">
        <div class="field">
          <input id="identifier" type="text" placeholder="Benutzername oder E-Mail" required autofocus />
        </div>
        <div class="field">
          <input id="password" type="password" placeholder="Passwort" required />
        </div>
        <button id="loginBtn" class="btn btn--primary btn--block" type="submit">
          <span class="btn__label">EINLOGGEN</span><span class="spinner" hidden></span>
        </button>
        <div id="loginStatus" class="formmsg"></div>
      </form>
      <div class="login__foot">Launcher v<span id="vLogin">0.1.1</span></div>
    </div>
  </section>

  <!-- ░░ APP ░░ -->
  <div class="app">
    <!-- left rail -->
    <aside class="rail">
      <div class="rail__title">SPIELE</div>
      <button class="game game--active" data-channel="live">
        <div class="game__thumb live">IF</div>
        <div class="game__meta"><div class="game__name">IFASY</div><div class="game__tag">LIVE</div></div>
        <span class="game__dot"></span>
      </button>
      <button class="game" data-channel="ptb">
        <div class="game__thumb ptb">IF</div>
        <div class="game__meta"><div class="game__name">IFASY</div><div class="game__tag ptb">PTB · DEV</div></div>
        <span class="game__dot"></span>
      </button>

      <div class="rail__spacer"></div>

      <div class="account">
        <div class="account__avatar" id="avatar">?</div>
        <div class="account__meta">
          <div class="account__name" id="userName">—</div>
          <div class="account__role" id="userRole">user</div>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn--ghost btn--block">Abmelden</button>
    </aside>

    <!-- stage -->
    <main class="stage">
      <section class="hero" id="hero">
        <div class="hero__art" id="heroArt"></div>
        <div class="hero__shade"></div>
        <div class="hero__content">
          <span class="chip" id="heroChip">LIVE</span>
          <h1 class="hero__title">IFASY</h1>
          <p class="hero__desc" id="heroDesc">Überlebe die Horde — solo oder im Koop bis zu 4 Spieler.</p>
        </div>
      </section>

      <section class="news">
        <div class="news__title">NEUIGKEITEN</div>
        <div class="news__item">
          <b>Launcher v0.1.1</b>
          <span>Neues Gameforge-Design &amp; Login-Fix. Demnächst: Spiel-Download.</span>
        </div>
      </section>

      <footer class="action">
        <div class="action__left">
          <div class="action__state" id="abState">Version wird geladen…</div>
          <div class="bar" id="progress" hidden><span class="bar__fill" id="barFill"></span></div>
        </div>
        <button id="playBtn" class="btn btn--play" disabled>PRÜFE…</button>
      </footer>
    </main>
  </div>

  <!-- ░░ SETTINGS DRAWER ░░ -->
  <div class="scrim" id="scrim" hidden></div>
  <aside class="drawer" id="settings" aria-hidden="true">
    <div class="drawer__head"><span>Einstellungen</span><button id="setClose" class="winbtn">&#10005;</button></div>
    <div class="drawer__row"><span>Launcher-Version</span><b id="launcherVer">–</b></div>
    <div class="drawer__row"><span>Kanal</span><b id="setChannel">LIVE</b></div>
    <button id="updBtn" class="btn btn--accent btn--block">Nach Launcher-Updates suchen</button>
    <div id="updStatus" class="drawer__msg"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
